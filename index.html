<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculatrice JS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="wrapper">
    <div class="calculator">

      <div class="calc-header">
        <span class="header-label">CALC</span>
        <div class="header-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
      </div>

      <div class="screen">
        <div class="screen-inner">
          <div id="history-tape"></div>
          <div id="expression"></div>
          <div id="display">0</div>
        </div>
        <div class="screen-reflection"></div>
      </div>

      <div class="buttons">
        <button class="btn btn-clear span2" onclick="pressBtn(this, clearAll)">AC</button>
        <button class="btn btn-clear" onclick="pressBtn(this, deleteLast)">⌫</button>
        <button class="btn btn-op" onclick="pressBtn(this, () => appendOp('/'))">÷</button>

        <button class="btn" onclick="pressBtn(this, () => appendNum('7'))">7</button>
        <button class="btn" onclick="pressBtn(this, () => appendNum('8'))">8</button>
        <button class="btn" onclick="pressBtn(this, () => appendNum('9'))">9</button>
        <button class="btn btn-op" onclick="pressBtn(this, () => appendOp('*'))">×</button>

        <button class="btn" onclick="pressBtn(this, () => appendNum('4'))">4</button>
        <button class="btn" onclick="pressBtn(this, () => appendNum('5'))">5</button>
        <button class="btn" onclick="pressBtn(this, () => appendNum('6'))">6</button>
        <button class="btn btn-op" onclick="pressBtn(this, () => appendOp('-'))">−</button>

        <button class="btn" onclick="pressBtn(this, () => appendNum('1'))">1</button>
        <button class="btn" onclick="pressBtn(this, () => appendNum('2'))">2</button>
        <button class="btn" onclick="pressBtn(this, () => appendNum('3'))">3</button>
        <button class="btn btn-op" onclick="pressBtn(this, () => appendOp('+'))">+</button>

        <button class="btn span2" onclick="pressBtn(this, () => appendNum('0'))">0</button>
        <button class="btn" onclick="pressBtn(this, appendDot)">.</button>
        <button class="btn btn-equal" onclick="pressBtn(this, calculate)">=</button>
      </div>

    </div>
    <p class="hint">Vous pouvez aussi utiliser votre clavier ↑</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
